<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Authorization callback — finance-autolog</title>
<style>
body{font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;max-width:640px;margin:48px auto;padding:0 20px;line-height:1.6;color:#1a1a2e;background:#f6f8ff}
.card{background:#fff;border:1px solid #e0e4f5;border-radius:16px;padding:28px;box-shadow:0 4px 24px rgba(40,60,120,.08)}
h1{font-size:22px;margin:0 0 6px}
.ok{color:#1a9d6a;font-weight:700}
.err{color:#cc3344;font-weight:700}
label{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:#888;margin:18px 0 4px}
.val{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:14px;background:#f2f4fb;border:1px solid #e0e4f5;border-radius:10px;padding:12px 14px;word-break:break-all}
button{margin-top:6px;background:#3b5bdb;color:#fff;border:0;border-radius:10px;padding:10px 16px;font-size:14px;font-weight:600;cursor:pointer}
button:active{transform:translateY(1px)}
.full{margin-top:22px}
small{color:#888}
</style></head><body>
<div class="card">
<h1>finance-autolog</h1>
<p id="status">Reading authorization response…</p>
<div id="fields"></div>
<div class="full">
  <label>Full callback URL (paste this back to the script)</label>
  <div class="val" id="fullurl"></div>
  <button onclick="copyUrl()">Copy full URL</button>
</div>
<p style="margin-top:20px"><small>You can close this tab after copying.</small></p>
</div>
<script>
const p = new URLSearchParams(location.search);
const code = p.get('code'), state = p.get('state'), err = p.get('error');
const st = document.getElementById('status'), f = document.getElementById('fields');
document.getElementById('fullurl').textContent = location.href;
// query params go through textContent only (never innerHTML) to avoid reflected XSS
function field(lab, value) {
  const l = document.createElement('label'); l.textContent = lab;
  const d = document.createElement('div'); d.className = 'val'; d.textContent = value;
  f.append(l, d);
}
function setStatus(cls, strong, rest) {
  st.textContent = '';
  const s = document.createElement('span'); s.className = cls; s.textContent = strong;
  st.append(s, rest ? ' ' + rest : '');
}
if (err) {
  setStatus('err', 'Authorization failed: ' + err);
} else if (code) {
  setStatus('ok', '✓ Authorized.', 'Copy the values below.');
  field('code', code);
  if (state) field('state', state);
} else {
  st.textContent = 'No authorization code found in the URL.';
}
function copyUrl(){ navigator.clipboard.writeText(location.href).then(()=>{event.target.textContent='Copied ✓';}); }
</script>
</body></html>
